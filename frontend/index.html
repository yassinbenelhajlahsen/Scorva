<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a0c" />
    <meta
      name="description"
      content="Live scores, standings, and player stats for NBA, NFL, and NHL. Track your favorite teams and players with Scorva."
    />
    <link rel="dns-prefetch" href="https://a.espncdn.com" />
    <link rel="dns-prefetch" href="https://scorva.up.railway.app" />
    <link rel="preconnect" href="https://scorva.up.railway.app" crossorigin />
    <title>Scorva</title>
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Scorva" />
  </head>
  <body>
    <style>
      #app-shell {
        position: fixed;
        inset: 0;
        background: #0a0a0c;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2.5rem;
        z-index: 9999;
        transition: opacity 200ms ease;
      }
      @media (display-mode: standalone), (pointer: coarse) {
        #app-shell {
          display: flex;
        }
      }
      #app-shell.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-shell img {
        width: 11rem;
        height: 11rem;
        user-select: none;
        -webkit-mask-image: radial-gradient(
          circle at center,
          black 60%,
          transparent 92%
        );
        mask-image: radial-gradient(
          circle at center,
          black 60%,
          transparent 92%
        );
      }
      @media (min-width: 640px) {
        #app-shell img {
          width: 14rem;
          height: 14rem;
        }
      }
      #app-shell-bubbles {
        display: flex;
        gap: 0.75rem;
      }
      #app-shell-bubbles span {
        width: 1rem;
        height: 1rem;
        border-radius: 9999px;
        animation: bubble-float 1s ease-in-out infinite;
      }
      @media (min-width: 640px) {
        #app-shell-bubbles span {
          width: 1.25rem;
          height: 1.25rem;
        }
      }
      #app-shell-bubbles span:nth-child(1) {
        background: #e8863a;
        animation-delay: 0s;
      }
      #app-shell-bubbles span:nth-child(2) {
        background: #f0974d;
        animation-delay: 0.2s;
      }
      #app-shell-bubbles span:nth-child(3) {
        background: #ffb88a;
        animation-delay: 0.4s;
      }
      @keyframes bubble-float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-12px);
        }
      }
    </style>
    <div id="app-shell" aria-hidden="true">
      <img
        src="/icons/icon-192.png"
        alt=""
        width="192"
        height="192"
        decoding="async"
      />
      <div id="app-shell-bubbles" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
